<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Tantalus - Greek Mythology">
<meta property="og:description" content="Discover the story of Tantalus, a symbol of ambition and eternal punishment in Greek mythology.">
<meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/2/22/Tantalus_Painting.jpg">
<meta property="og:url" content="https://www.linkedin.com/in/rantalus-tantalus-a811533a9?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app">
<meta property="og:type" content="website">
  <title>Tantalus - rantalus</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; font-family: Arial, sans-serif; overflow: hidden; background: #0d0d0d; color: #fff; }

    /* Particles.js container */
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: -1;
      top: 0; left: 0;
    }

    /* Content overlay */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 50px 20px;
    }

    .profile-container {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .profile-container img.profile {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 3px solid #fff;
      transition: transform 0.3s;
      cursor: pointer;
    }

    .profile-container:hover img.profile {
      transform: scale(1.1);
    }

    /* LinkedIn tooltip */
    .linkedin-tooltip {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 0.9em;
      display: none;
      white-space: nowrap;
    }

    .profile-container:hover .linkedin-tooltip {
      display: block;
    }

    h1 { font-size: 3em; color: #ff6666; margin-bottom: 20px; }
    p { font-size: 1.2em; max-width: 700px; margin: 0 auto 20px auto; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- Particles.js background -->
  <div id="particles-js"></div>

  <!-- Content -->
  <div class="content">
    <div class="profile-container">
      <a href="https://www.linkedin.com/in/rantalus-tantalus-a811533a9?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=ios_app" target="_blank">
        <img class="profile" src="https://github.com/rantalus.png" alt="GitHub Profile">
      </a>
      <div class="linkedin-tooltip">Connect on LinkedIn</div>
    </div>

    <h1>Tantalus</h1>
    <p>
      Tantalus is a figure from Greek mythology, punished eternally for his excessive ambition. 
      He is forever tantalized by food and water that recede whenever he tries to consume them.
    </p>
  </div>

  <!-- Particles.js library -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 120, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.7, "random": true },
        "size": { "value": 2, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.3, "width": 1 },
        "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true, "straight": false }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": { "enable": true, "mode": "repulse" },
          "onclick": { "enable": true, "mode": "push" }
        },
        "modes": {
          "repulse": { "distance": 100 },
          "push": { "particles_nb": 4 }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
