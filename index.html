  <!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            overflow-x: hidden;
        }
        #vanta-bg, #particles-js {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #vanta-bg { z-index: -2; opacity: 0.6; }
        #particles-js { z-index: -1; }

        .mono-overlay {
            filter: grayscale(100%) sepia(50%) hue-rotate(240deg);
        }
        .site-header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 1.1rem;
            color: #d7c3f2;
        }

        .hero-section {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 10%;
        }

        .hero-title {
            font-size: clamp(2.2rem, 8vw, 4.5rem);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 6px;
            /* تأثير مونو سيريالي */
            filter: drop-shadow(0 0 15px rgba(97, 15, 202, 0.5));
        }

        .hero-subtitle {
            font-size: 1.2rem;
            max-width: 600px;
            opacity: 0.8;
            line-height: 1.7;
            margin-bottom: 50px;
        }
        .image-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 60px;
        }

        .image-card {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            /* تأثير التلاشي في الضباب */
            box-shadow: 0 0 40px rgba(97, 15, 202, 0.1);
            transition: all 0.5s ease;
            backdrop-filter: blur(5px);
        }

        .image-card:hover {
            transform: scale(1.03);
            border-color: rgba(97, 15, 202, 0.3);
            box-shadow: 0 0 50px rgba(97, 15, 202, 0.3);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: blur(2px) saturate(0);
            transition: all 0.5s ease;
        }

        .image-card:hover img {
            opacity: 1;
            filter: blur(0px) saturate(0);
        }

        .card-caption {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #EEEEFE;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .cta-button {
            padding: 16px 45px;
            background: transparent;
            border: 1px solid #610fca;
            color: #EEEEFE;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            font-weight: bold;
        }

        .cta-button:hover {
            background: #610fca;
            box-shadow: 0 0 35px rgba(97, 15, 202, 0.7);
        }
    </style>
</head>
<body class="mono-overlay">

    <div id="vanta-bg"></div>
    <div id="particles-js"></div>

    <header class="site-header">
        <div class="logo">RIJN IJSSEL x 0</div>
        <nav style="font-size: 0.75rem; opacity: 0.5; letter-spacing: 1px;">[ SENSATION OVERLAY ]</nav>
    </header>

    <main class="hero-section">
        <p style="letter-spacing: 8px; font-size: 0.7rem; opacity: 0.5; margin-bottom: 10px;">THE ORIGIN OF SENSATION</p>
        <h1 class="hero-title">Sociaal Werker</h1>
        <p class="hero-subtitle">
            Ontdek de nieuwe dimensie van leren. Waar technologie en menselijkheid samenkomen in een sfeer van rust en innovatie.
        </p>

        <div class="image-gallery">
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1573497019940-1c28c88b4f3e?q=80&w=600&auto=format&fit=crop" alt="Experiementele Foto 1">
                <div class="card-caption">Interactie</div>
            </div>
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1516534775068-ba3e7458af70?q=80&w=600&auto=format&fit=crop" alt="Experiementele Foto 2">
                <div class="card-caption">Samenwerking</div>
            </div>
            <div class="image-card">
                <img src="https://images.unsplash.com/photo-1531482615713-2afd69097998?q=80&w=600&auto=format&fit=crop" alt="Experiementele Foto 3">
                <div class="card-caption">Innovatie</div>
            </div>
        </div>

        <button class="cta-button">Meld je aan</button>
    </main>

    <footer style="padding: 40px; text-align: center; font-size: 0.6rem; opacity: 0.3; letter-spacing: 2px;">
        DESIGNED BY A0Z // 0 ORIGIN // EXPERIMENTAL PROTOTYPE
    </footer>

    <script>
        VANTA.FOG({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            highlightColor: 0x610fca, 
            midtoneColor: 0x1b0434,   
            lowlightColor: 0x000000,
            baseColor: 0x000000,
            blurFactor: 0.8,
            speed: 1.0,
            zoom: 1.0
        });

        particlesJS("particles-js", {
            particles: {
                number: { value: 65, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                opacity: { value: 0.4, random: true },
                size: { value: 1.5, random: true },
                move: { enable: true, speed: 0.2, direction: "none", random: true },
                line_linked: { enable: false }
            }
        });
    </script>
</body>
</html>
