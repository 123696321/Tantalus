 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origin Pro Interface</title>
    <style>
        :root {
            --primary-orange: #ff4747;
            --bg-dark: #121212;
            --sidebar-color: #1e1e1e;
            --card-bg: #2a2a2a;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        aside {
            width: 240px;
            background-color: var(--sidebar-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-left: 1px solid #333;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-orange);
            margin-bottom: 40px;
            text-align: center;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 12px;
            display: block;
            border-radius: 8px;
            transition: 0.3s;
            margin-bottom: 5px;
        }

        nav a:hover, nav a.active {
            background-color: var(--primary-orange);
            color: white;
        }

        /* Main Content */
        main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-bar {
            background: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            color: white;
            width: 300px;
        }

        /* Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-orange);
        }

        .game-img {
            width: 100%;
            height: 250px;
            background: #444; /* Placeholder */
            object-fit: cover;
        }

        .game-info {
            padding: 15px;
        }

        .game-title {
            font-weight: bold;
            font-size: 16px;
        }

        .game-price {
            color: var(--primary-orange);
            margin-top: 5px;
            font-size: 14px;
        }

        /* Custom Scrollbar */
        main::-webkit-scrollbar { width: 8px; }
        main::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

        <div class="logo">ORIGIN NEXT</div>
        <nav>

            <a href="#">مكتبتي</a>
            <a href="#">العروض</a>
            <a href="#">الإعدادات</a>
        </nav>
    </aside>

    <main>
        <div class="header">
            <h2>اكتشف الألعاب</h2>

        </div>

                <div class="game-info">
                    <div class="game-title">Battlefield 2042</div>
                    <div class="game-price">59.99$</div>
                </div>
            </div>
